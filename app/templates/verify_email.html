{% extends "base.html" %}

{% block title %}Email Verification - BookVerse{% endblock %}

{% block content %}
<section class="auth-screen">
    <div class="auth-card reveal" style="max-width:520px; margin:auto;">
        <div class="form-heading">
            <h2>Resend verification</h2>
            <p>Enter the email address you used to sign up, and a verification link will be prepared.</p>
        </div>
        <form method="post">
            <label class="field">
                <span>Email address</span>
                <input type="email" name="email" placeholder="reader@bookverse.com" required autocomplete="email">
            </label>
            <button class="btn btn-primary btn-wide" type="submit" data-ripple>Send verification link</button>
        </form>
        <p class="form-note">Already verified? <a href="{{ url_for('auth.login') }}">Sign in</a>.</p>
    </div>
</section>
{% endblock %}
