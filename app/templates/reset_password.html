{% extends "base.html" %}
{% block title %}Reset Password – BookVerse{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="auth-card reveal">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h1>Reset Password</h1>
            <p>Choose a strong new password for your account</p>
        </div>

        <form method="post" action="{{ url_for('auth.reset_password', token=token) }}" novalidate>
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-pw-wrap">
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Min. 8 characters" autocomplete="new-password" required>
                    <button type="button" class="pw-toggle" aria-label="Toggle" data-pw-toggle>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <div class="input-pw-wrap">
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                           placeholder="Repeat password" autocomplete="new-password" required>
                    <button type="button" class="pw-toggle" aria-label="Toggle" data-pw-toggle>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button class="btn btn-primary btn-full" type="submit" data-ripple>Reset Password</button>
        </form>

        <p class="auth-switch">
            <a class="text-link" href="{{ url_for('auth.forgot_password') }}">Request a new link instead</a>
        </p>
    </div>
</section>
{% endblock %}
