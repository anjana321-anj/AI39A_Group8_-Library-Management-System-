{% extends "base.html" %}

{% block title %}Reset Password - BookVerse{% endblock %}

{% block content %}
<section class="auth-screen">
    <div class="auth-card reveal" style="max-width:520px; margin:auto;">
        <div class="form-heading">
            <h2>Reset your password</h2>
            <p>Enter a new password to complete the reset process.</p>
        </div>
        <form method="post">
            <label class="field password-field">
                <span>New password</span>
                <input type="password" name="password" placeholder="Minimum 8 characters" minlength="8" required autocomplete="new-password" data-password-input>
                <button type="button" class="field-icon" aria-label="Show password" data-password-toggle>Show</button>
            </label>
            <label class="field password-field">
                <span>Confirm password</span>
                <input type="password" name="confirm_password" placeholder="Repeat password" minlength="8" required autocomplete="new-password" data-password-input>
                <button type="button" class="field-icon" aria-label="Show password" data-password-toggle>Show</button>
            </label>
            <button class="btn btn-primary btn-wide" type="submit" data-ripple>Update password</button>
        </form>
        <p class="form-note">Back to <a href="{{ url_for('auth.login') }}">Sign in</a>.</p>
    </div>
</section>
{% endblock %}
