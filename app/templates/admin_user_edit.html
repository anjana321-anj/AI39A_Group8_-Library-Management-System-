{% extends "base.html" %}

{% block title %}Edit User - BookVerse Admin{% endblock %}

{% block content %}
<section class="auth-screen">
    <div class="auth-card reveal" style="max-width:560px; margin:auto;">
        <div class="form-heading">
            <h2>Edit user</h2>
            <p>Update this account's username, email, and admin role.</p>
        </div>
        <form method="post">
            <label class="field">
                <span>Username</span>
                <input type="text" name="username" value="{{ user.username }}" required autocomplete="username">
            </label>
            <label class="field">
                <span>Email address</span>
                <input type="email" name="email" value="{{ user.email }}" required autocomplete="email">
            </label>
            <label class="check-field">
                <input type="checkbox" name="is_admin" {% if user.is_admin %}checked{% endif %}>
                <span>Grant admin access</span>
            </label>
            <button class="btn btn-primary btn-wide" type="submit" data-ripple>Save changes</button>
        </form>
        <p class="form-note">Return to <a href="{{ url_for('auth.admin_users') }}">user management</a>.</p>
    </div>
</section>
{% endblock %}
