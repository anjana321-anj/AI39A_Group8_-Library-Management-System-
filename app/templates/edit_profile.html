{% extends "base.html" %}

{% block content %}
<h2>Edit Profile</h2>

<form method="POST">
    <input
        type="text"
        name="username"
        value="{{ user.username }}"
        required
    >

    <input
        type="email"
        name="email"
        value="{{ user.email }}"
        required
    >

    <button type="submit">
        Save Changes
    </button>
</form>
{% endblock %}
