{% extends "base.html" %}
{% block title %}Forgot Password – BookVerse{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="auth-card reveal">
        <div class="auth-header">
            <div class="auth-icon">🔑</div>
            <h1>Forgot Password?</h1>
            <p>Enter your email and we will send you a reset link</p>
        </div>

        <form method="post" action="{{ url_for('auth.forgot_password') }}" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="you@example.com" autocomplete="email" required>
            </div>
            <button class="btn btn-primary btn-full" type="submit" data-ripple>Send Reset Link</button>
        </form>

        <p class="auth-switch">
            <a class="text-link" href="{{ url_for('auth.login') }}">← Back to Sign In</a>
        </p>
    </div>
</section>
{% endblock %}
