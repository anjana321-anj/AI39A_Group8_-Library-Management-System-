{% extends "base.html" %}

{% block title %}Forgot Password - BookVerse{% endblock %}

{% block content %}
<section class="auth-screen">
    <div class="auth-card reveal" style="max-width:520px; margin:auto;">
        <div class="form-heading">
            <h2>Forgot password</h2>
            <p>Enter your registered email and we will prepare a reset link for you.</p>
        </div>
        <form method="post">
            <label class="field">
                <span>Email address</span>
                <input type="email" name="email" placeholder="reader@bookverse.com" required autocomplete="email">
            </label>
            <button class="btn btn-primary btn-wide" type="submit" data-ripple>Send reset link</button>
        </form>
        <p class="form-note">Remembered your password? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
</section>
{% endblock %}
