{% extends "base.html" %}
{% block title %}Sign In – BookVerse{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="auth-card reveal">
        <div class="auth-header">
            <div class="auth-icon">📖</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your BookVerse account</p>
        </div>

        <form method="post" action="{{ url_for('auth.login') }}" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-pw-wrap">
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="••••••••" autocomplete="current-password" required>
                    <button type="button" class="pw-toggle" aria-label="Toggle password visibility" data-pw-toggle>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-row-between">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a class="text-link small" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
            </div>
            <button class="btn btn-primary btn-full" type="submit" data-ripple>Sign In</button>
        </form>

        <p class="auth-switch">New to BookVerse? <a class="text-link" href="{{ url_for('auth.register') }}">Create an account</a></p>
    </div>
</section>
{% endblock %}
