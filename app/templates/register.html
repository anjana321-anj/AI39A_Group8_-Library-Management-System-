{% extends "base.html" %}
{% block title %}Create Account – BookVerse{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="auth-card reveal">
        <div class="auth-header">
            <div class="auth-icon">✨</div>
            <h1>Join BookVerse</h1>
            <p>Create your free library account today</p>
        </div>

        <form method="post" action="{{ url_for('auth.register') }}" novalidate>
            <div class="form-group">
                <label for="username">Full Name</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Your name" autocomplete="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-pw-wrap">
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Min. 8 characters" autocomplete="new-password" required>
                    <button type="button" class="pw-toggle" aria-label="Toggle" data-pw-toggle>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-pw-wrap">
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                           placeholder="Repeat password" autocomplete="new-password" required>
                    <button type="button" class="pw-toggle" aria-label="Toggle" data-pw-toggle>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button class="btn btn-primary btn-full" type="submit" data-ripple>Create Account</button>
        </form>

        <p class="auth-switch">Already have an account? <a class="text-link" href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
</section>
{% endblock %}
