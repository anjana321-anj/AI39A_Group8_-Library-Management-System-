{% extends "base.html" %}
{% block title %}Change Password – BookVerse{% endblock %}

{% block content %}
<section class="form-page reveal">
    <div class="form-card">
        <div class="form-card-header">
            <h1>Change Password</h1>
            <p>Enter your current password and choose a new one</p>
        </div>

        <form method="post" action="{{ url_for('auth.change_password') }}" novalidate>
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <div class="input-pw-wrap">
                    <input type="password" id="current_password" name="current_password"
                           class="form-control" placeholder="••••••••" required>
                    <button type="button" class="pw-toggle" aria-label="Toggle" data-pw-toggle>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <div class="input-pw-wrap">
                    <input type="password" id="new_password" name="new_password"
                           class="form-control" placeholder="Min. 8 characters" required>
                    <button type="button" class="pw-toggle" aria-label="Toggle" data-pw-toggle>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <div class="input-pw-wrap">
                    <input type="password" id="confirm_password" name="confirm_password"
                           class="form-control" placeholder="Repeat new password" required>
                    <button type="button" class="pw-toggle" aria-label="Toggle" data-pw-toggle>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" type="submit" data-ripple>Update Password</button>
                <a class="btn btn-ghost" href="{{ url_for('auth.profile') }}">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
