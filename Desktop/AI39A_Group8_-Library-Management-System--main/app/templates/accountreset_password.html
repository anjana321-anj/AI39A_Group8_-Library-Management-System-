{% extends "base.html" %}

{% block title %}Reset Account Password - BookVerse{% endblock %}

{% block content %}
<section class="auth-screen">
    <div class="auth-visual reveal">
        <span class="eyebrow">Profile settings</span>
        <h1 class="hero-title">Update your password.</h1>
        <p class="hero-copy">Confirm your current password before choosing a new one.</p>
    </div>

    <form class="auth-card reveal" method="post" data-loading-form>
        <div class="form-heading">
            <h2>Reset Password</h2>
            <p>Signed in as {{ user.email }}.</p>
        </div>
        <label class="field password-field">
            <span>Current password</span>
            <input type="password" name="current_password" required autocomplete="current-password" data-password-input>
            <button type="button" class="field-icon" aria-label="Show password" data-password-toggle>Show</button>
        </label>
        <label class="field password-field">
            <span>New password</span>
            <input type="password" name="password" minlength="8" required autocomplete="new-password" data-password-input>
            <button type="button" class="field-icon" aria-label="Show password" data-password-toggle>Show</button>
        </label>
        <label class="field password-field">
            <span>Confirm new password</span>
            <input type="password" name="confirm_password" minlength="8" required autocomplete="new-password" data-password-input>
            <button type="button" class="field-icon" aria-label="Show password" data-password-toggle>Show</button>
        </label>
        <button class="btn btn-primary btn-wide" type="submit" data-ripple>
            <span class="btn-label">Update Password</span>
            <span class="btn-loader"></span>
        </button>
    </form>
</section>
{% endblock %}
