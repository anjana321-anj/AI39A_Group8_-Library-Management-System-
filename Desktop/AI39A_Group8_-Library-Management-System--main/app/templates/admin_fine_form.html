{% extends "base.html" %}

{% block title %}Edit Fine - BookVerse{% endblock %}

{% block content %}
<section class="page-hero reveal">
    <span class="eyebrow">Admin Fine</span>
    <h1>Edit fine record.</h1>
    <p>{{ fine.username }} - {{ fine.title }}</p>
</section>

<section class="data-panel reveal">
    <form class="admin-form-grid" method="post">
        <label class="field">
            <span>Amount</span>
            <input type="number" step="0.01" min="0" name="total_fine" value="{{ fine.total_fine or 0 }}">
        </label>
        <label class="field">
            <span>Status</span>
            <select name="status">
                {% for status in ['Pending', 'Pending Verification', 'Paid', 'Unpaid', 'Waived'] %}
                    <option value="{{ status }}" {{ 'selected' if fine.status == status else '' }}>{{ status }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="field full-field">
            <span>Reason</span>
            <input type="text" name="reason" value="{{ fine.reason or 'Overdue return' }}">
        </label>
        <div class="form-row full-field">
            <button class="btn btn-primary" type="submit">Update Fine</button>
            <a class="btn btn-secondary" href="{{ url_for('auth.admin_fines') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
